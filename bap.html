<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        svg { border: 1px solid #333; background-color: #000; max-width: 90vw; max-height: 90vh; }
    </style>
</head>
<body>

<svg id="canvas" viewBox="0 0 800 600" width="1600" height="1200" xmlns="http://www.w3.org/2000/svg">
    </svg>

<script>
    const svg = document.getElementById('canvas');
    const maxCircles = 100;
    let circleCount = 0;

    function createCircle() {
        if (circleCount >= maxCircles) {
            clearInterval(interval);
            return;
        }

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        
        // Randomize attributes
        const radius = Math.random() * 40 + 10; // Radius between 10 and 50
        const x = Math.random() * 800;
        const y = Math.random() * 600;
        
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", radius);
        circle.setAttribute("fill", "#FF69B4"); // The pink from your image

        svg.appendChild(circle);
        circleCount++;
    }

    // Run the function every 1000ms (1 second)
    const interval = setInterval(createCircle, 1000);
</script>

</body>
</html>
