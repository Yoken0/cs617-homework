<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Boston Crime — Interactive Bonus Edition</title>
        <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Segoe UI", sans-serif;
                background: #0d1117;
                color: #c9d1d9;
                line-height: 1.6;
            }
            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 30px 20px;
            }
            header {
                text-align: center;
                margin-bottom: 40px;
                border-bottom: 2px solid #21262d;
                padding-bottom: 20px;
            }
            h1 span {
                color: #58a6ff;
            }
            .bonus-badge {
                background: #238636;
                color: white;
                padding: 5px 15px;
                border-radius: 20px;
                font-size: 0.8em;
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-top: 20px;
            }
            .story-section {
                background: #161b22;
                border: 1px solid #21262d;
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 20px;
            }
            .full-width {
                grid-column: 1 / -1;
            }
            .instruction {
                color: #58a6ff;
                font-weight: bold;
                text-align: center;
                margin-bottom: 10px;
            }
            #pie-chart-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            footer {
                text-align: center;
                padding: 20px;
                color: #484f58;
                font-size: 0.8em;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Boston Crime <span>Linked Visuals</span></h1>
                <div class="bonus-badge">
                    Assignment 3 Bonus: Interactive Linking
                </div>
            </header>

            <div class="grid">
                <div class="story-section full-width">
                    <p class="instruction">
                        👆 Click on any District bar to filter the chart below!
                    </p>
                    <div id="barchart"></div>
                </div>

                <div class="story-section" id="pie-chart-container">
                    <h3 id="detail-title" style="text-align: center">
                        District Composition
                    </h3>
                    <div id="piechart"></div>
                </div>

                <div class="story-section">
                    <h3>Temporal Overview</h3>
                    <div id="heatmap"></div>
                </div>
            </div>

            <footer>CS617 Spring 2026 | Linked Data Story</footer>
        </div>

        <script>
            // --- DATA AS PROVIDED ---
            const heatmapData = {
                days: [
                    "Monday",
                    "Tuesday",
                    "Wednesday",
                    "Thursday",
                    "Friday",
                    "Saturday",
                    "Sunday",
                ],
                hours: Array.from({ length: 24 }, (_, i) => i),
                values: [
                    [
                        380, 88, 100, 57, 44, 57, 72, 122, 170, 215, 226, 241,
                        261, 232, 215, 255, 267, 266, 249, 197, 212, 177, 124,
                        88,
                    ],
                    [
                        338, 87, 72, 46, 36, 48, 74, 143, 222, 242, 232, 284,
                        300, 249, 216, 247, 291, 313, 271, 220, 219, 202, 154,
                        118,
                    ],
                    [
                        372, 81, 53, 45, 32, 41, 58, 119, 196, 229, 278, 225,
                        285, 232, 230, 224, 299, 289, 275, 209, 218, 161, 142,
                        101,
                    ],
                    [
                        336, 87, 69, 54, 29, 47, 52, 112, 160, 206, 217, 230,
                        283, 198, 204, 186, 251, 230, 263, 230, 180, 181, 153,
                        100,
                    ],
                    [
                        373, 116, 91, 42, 41, 55, 62, 110, 171, 188, 199, 239,
                        257, 225, 208, 242, 232, 316, 237, 205, 163, 196, 155,
                        131,
                    ],
                    [
                        369, 144, 133, 85, 56, 63, 65, 97, 177, 196, 212, 235,
                        281, 229, 234, 213, 232, 248, 229, 214, 198, 218, 181,
                        163,
                    ],
                    [
                        332, 165, 158, 115, 78, 54, 53, 74, 98, 148, 177, 186,
                        207, 189, 192, 181, 251, 223, 192, 186, 177, 176, 141,
                        130,
                    ],
                ],
            };

            const barData = {
                districts: [
                    "A1",
                    "A15",
                    "A7",
                    "B2",
                    "B3",
                    "C11",
                    "C6",
                    "D14",
                    "D4",
                    "E13",
                    "E18",
                    "E5",
                ],
                offenses: [
                    "ASSAULT - SIMPLE",
                    "INVESTIGATE PERSON",
                    "M/V - LEAVING SCENE",
                    "SICK ASSIST",
                    "TOWED VEHICLE",
                ],
                data: {
                    "ASSAULT - SIMPLE": [
                        254, 14, 63, 175, 127, 157, 114, 83, 194, 59, 58, 56,
                    ],
                    "INVESTIGATE PERSON": [
                        314, 63, 151, 443, 306, 336, 233, 256, 382, 178, 189,
                        176,
                    ],
                    "M/V - LEAVING SCENE": [
                        153, 42, 77, 205, 178, 288, 141, 141, 180, 75, 99, 93,
                    ],
                    "SICK ASSIST": [
                        339, 59, 166, 365, 248, 247, 191, 184, 354, 168, 121,
                        122,
                    ],
                    "TOWED VEHICLE": [
                        130, 43, 114, 136, 94, 161, 194, 140, 153, 88, 37, 28,
                    ],
                },
            };

            const barColors = [
                "#58a6ff",
                "#f78166",
                "#d2a8ff",
                "#3fb950",
                "#f0883e",
            ];

            // --- 1. RENDER HEATMAP (Context) ---
            Plotly.newPlot(
                "heatmap",
                [
                    {
                        z: heatmapData.values,
                        x: heatmapData.hours,
                        y: heatmapData.days,
                        type: "heatmap",
                        colorscale: "Viridis",
                        showscale: false,
                    },
                ],
                {
                    paper_bgcolor: "#0d1117",
                    plot_bgcolor: "#0d1117",
                    font: { color: "#8b949e", size: 10 },
                    margin: { t: 10, b: 20, l: 60, r: 10 },
                    height: 250,
                },
            );

            // --- 2. RENDER BAR CHART (Master) ---
            const barTraces = barData.offenses.map((offense, i) => ({
                x: barData.districts,
                y: barData.data[offense],
                name: offense,
                type: "bar",
                marker: { color: barColors[i] },
            }));

            const barLayout = {
                paper_bgcolor: "#0d1117",
                plot_bgcolor: "#0d1117",
                font: { color: "#c9d1d9" },
                barmode: "group",
                margin: { t: 40, b: 40, l: 40, r: 20 },
                height: 350,
                legend: { orientation: "h", y: -0.2 },
            };

            Plotly.newPlot("barchart", barTraces, barLayout);

            // --- 3. LINKING LOGIC ---
            const updateDetailChart = (districtName) => {
                const districtIndex = barData.districts.indexOf(districtName);
                const values = barData.offenses.map(
                    (off) => barData.data[off][districtIndex],
                );

                const pieTrace = [
                    {
                        values: values,
                        labels: barData.offenses,
                        type: "pie",
                        hole: 0.4,
                        marker: { colors: barColors },
                        textinfo: "percent",
                    },
                ];

                const pieLayout = {
                    paper_bgcolor: "#161b22",
                    font: { color: "#c9d1d9" },
                    showlegend: false,
                    margin: { t: 20, b: 20, l: 20, r: 20 },
                    height: 250,
                };

                document.getElementById("detail-title").innerText =
                    `Crime Mix: District ${districtName}`;
                Plotly.newPlot("piechart", pieTrace, pieLayout);
            };

            // LISTEN FOR CLICKS ON THE BAR CHART
            document
                .getElementById("barchart")
                .on("plotly_click", function (data) {
                    const clickedDistrict = data.points[0].x;
                    updateDetailChart(clickedDistrict);
                });

            // INITIAL LOAD (Default to first district)
            updateDetailChart("A1");
        </script>
    </body>
</html>
